<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Docker Multi-Stage Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2c2c54);
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    p {
      color: #ccc;
      margin-bottom: 25px;
    }

    .badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 50px;
      background: #00c6ff;
      color: #000;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .version {
      display: inline-block;
      padding: 12px 25px;
      margin-top: 10px;
      border-radius: 8px;
      text-decoration: none;
      color: white;
      background: linear-gradient(135deg, #ff7a18, #ffb347);
      transition: 0.3s;
    }

    footer {
      text-align: center;
      padding: 15px;
      font-size: 0.9rem;
      color: #aaa;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="card">
      <div class="badge">🚀 Docker Project</div>

      <h1>Multi-Stage Build Demo</h1>
      <p>
        This app demonstrates a production-ready Docker setup with optimized images and clean architecture.
      </p>

      <p class="version">Version: <strong>latest</strong></p>
    </div>
  </div>

  <footer>
    Built with ❤️ for DevOps Learning
  </footer>

</body>
</html>
